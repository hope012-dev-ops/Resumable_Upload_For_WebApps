<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumable Upload for Google Drive</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 20px; }
        .hidden { display: none !important; }
        .storage-info {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
        }
        .storage-info .label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        .storage-info .value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1b5e20;
        }
        .storage-info .usage-bar {
            height: 6px;
            background: #c8e6c9;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        .storage-info .usage-fill {
            height: 100%;
            background: #4caf50;
            transition: width 0.3s;
        }
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #4285f4;
            background: #e8f0fe;
        }
        .drop-zone.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .drop-zone p { margin: 0; color: #666; }
        .drop-zone .hint {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
        .file-input { display: none; }
        .file-list {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        .file-item:last-child { border-bottom: none; }
        .file-icon {
            width: 40px;
            height: 40px;
            background: #e8f0fe;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 20px;
        }
        .file-info { flex: 1; min-width: 0; }
        .file-name {
            font-weight: 500;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-size { font-size: 12px; color: #666; }
        .file-status { font-size: 12px; margin-top: 4px; }
        .file-status.pending { color: #666; }
        .file-status.uploading { color: #4285f4; }
        .file-status.complete { color: #34a853; }
        .file-status.error { color: #ea4335; }
        .file-action {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 8px;
            font-size: 18px;
        }
        .file-action:hover { color: #333; }
        .file-action.remove:hover { color: #ea4335; }
        .file-action:disabled { opacity: 0.3; cursor: not-allowed; }
        .progress-container {
            background: #eee;
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #4285f4;
            transition: width 0.2s;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #4285f4;
            color: white;
        }
        .btn-primary:hover { background: #3367d6; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .btn-secondary {
            background: #eee;
            color: #333;
        }
        .btn-secondary:hover { background: #ddd; }
        .btn-secondary:disabled { color: #ccc; cursor: not-allowed; }
        .stats {
            background: white;
            padding: 15px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
        }
        .stat-value { font-size: 1.2rem; font-weight: 600; }
        .stat-label { font-size: 12px; color: #666; }
        .error-message {
            background: #fce8e6;
            color: #c5221f;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #666;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-top-color: #4285f4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>Resumable Upload for Google Drive</h1>

    <div id="mainContent">
        <div class="storage-info">
            <div class="label">Storage Available</div>
            <div class="value" id="storageRemaining">--</div>
            <div class="usage-bar">
                <div class="usage-fill" id="storageUsage" style="width: 0%"></div>
            </div>
            <div class="label" style="margin-top: 4px;" id="storageUsed">--</div>
        </div>

        <div class="drop-zone" id="dropZone">
            <p>Drag & drop files here<br>or click to select</p>
            <div class="hint">Max file size: <span id="maxFileSize">--</span></div>
            <input type="file" class="file-input" id="fileInput" multiple>
        </div>

        <div class="file-list" id="fileList"></div>

        <div class="actions">
            <button class="btn btn-primary" id="uploadBtn" disabled>Upload Files</button>
            <button class="btn btn-secondary" id="cancelBtn" class="hidden">Cancel</button>
        </div>

        <div class="stats" id="stats" class="hidden">
            <div>
                <div class="stat-value" id="speed">0 MB/s</div>
                <div class="stat-label">Speed</div>
            </div>
            <div>
                <div class="stat-value" id="remaining">--</div>
                <div class="stat-label">Remaining</div>
            </div>
            <div>
                <div class="stat-value" id="overallProgress">0%</div>
                <div class="stat-label">Progress</div>
            </div>
        </div>

        <div class="error-message" id="errorMessage" class="hidden"></div>
    </div>

    <div id="loadingScreen" class="loading hidden">
        <div class="spinner"></div>
        <span>Loading...</span>
    </div>

<script>
(function() {
    'use strict';

    const MAX_FILES = 100;
    const MAX_RETRIES = 3;
    const RETRY_DELAY = 1000;

    let files = [];
    let uploadedSize = 0;
    let totalSize = 0;
    let isUploading = false;
    let isCancelled = false;
    let uploadStartTime = 0;
    let abortedControllers = new Map();
    let storageQuota = { limit: 0, used: 0, remaining: 0 };

    const mainContent = document.getElementById('mainContent');
    const loadingScreen = document.getElementById('loadingScreen');
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const uploadBtn = document.getElementById('uploadBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const stats = document.getElementById('stats');
    const errorMessage = document.getElementById('errorMessage');
    const storageRemaining = document.getElementById('storageRemaining');
    const storageUsed = document.getElementById('storageUsed');
    const storageUsage = document.getElementById('storageUsage');
    const maxFileSizeEl = document.getElementById('maxFileSize');

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', handleFileSelect);

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (!isUploading) dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        handleFiles(e.dataTransfer.files);
    });

    uploadBtn.addEventListener('click', startUpload);
    cancelBtn.addEventListener('click', cancelUpload);

    async function getStorageQuota() {
        return new Promise((resolve, reject) => {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(reject)
                .getStorageQuota();
        });
    }

    function updateStorageDisplay() {
        storageRemaining.textContent = formatSize(storageQuota.remaining);
        storageUsed.textContent = formatSize(storageQuota.used) + ' used';
        const usedPercent = storageQuota.limit > 0 ? (storageQuota.used / storageQuota.limit * 100) : 0;
        storageUsage.style.width = usedPercent + '%';
        maxFileSizeEl.textContent = formatSize(storageQuota.remaining);
    }

    function calculateChunkSize(fileSize) {
        if (fileSize <= 5 * 1024 * 1024) return 5 * 1024 * 1024;
        if (fileSize <= 10 * 1024 * 1024) return 10 * 1024 * 1024;
        if (fileSize <= 50 * 1024 * 1024) return 15 * 1024 * 1024;
        if (fileSize <= 100 * 1024 * 1024) return 20 * 1024 * 1024;
        if (fileSize <= 500 * 1024 * 1024) return 50 * 1024 * 1024;
        if (fileSize <= 1024 * 1024 * 1024) return 100 * 1024 * 1024;
        return Math.min(250 * 1024 * 1024, Math.floor(storageQuota.remaining / 10));
    }

    function handleFileSelect(e) {
        handleFiles(e.target.files);
        fileInput.value = '';
    }

    function handleFiles(fileList) {
        const newFiles = Array.from(fileList);
        const currentCount = files.length;
        const maxFile = storageQuota.remaining;

        if (currentCount + newFiles.length > MAX_FILES) {
            showError(`Maximum ${MAX_FILES} files allowed`);
            return;
        }

        newFiles.forEach(file => {
            if (file.size > maxFile) {
                showError(`File "${file.name}" exceeds available storage (${formatSize(maxFile)})`);
                return;
            }
            if (file.size === 0) {
                showError(`File "${file.name}" is empty`);
                return;
            }

            const chunkSize = calculateChunkSize(file.size);

            const fileObj = {
                id: generateId(),
                file: file,
                name: file.name,
                size: file.size,
                type: file.type || 'application/octet-stream',
                chunkSize: chunkSize,
                status: 'pending',
                progress: 0,
                error: null,
                retries: 0
            };
            files.push(fileObj);
        });

        renderFileList();
        updateUI();
    }

    function generateId() {
        return Math.random().toString(36).substr(2, 9);
    }

    function formatSize(bytes) {
        if (bytes <= 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function formatTime(seconds) {
        if (seconds < 60) return seconds + 's';
        if (seconds < 3600) return Math.floor(seconds / 60) + 'm';
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        return h + 'h ' + m + 'm';
    }

    function renderFileList() {
        if (files.length === 0) {
            fileList.innerHTML = '';
            return;
        }

        fileList.innerHTML = files.map(f => `
            <div class="file-item" data-id="${f.id}">
                <div class="file-icon">📄</div>
                <div class="file-info">
                    <div class="file-name" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</div>
                    <div class="file-size">${formatSize(f.size)} (chunk: ${formatSize(f.chunkSize)})</div>
                    <div class="file-status ${f.status}">${getStatusText(f)}</div>
                    ${f.status === 'uploading' ? `
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${f.progress}%"></div>
                        </div>
                    ` : ''}
                </div>
                <button class="file-action remove" data-id="${f.id}" ${isUploading ? 'disabled' : ''}>✕</button>
            </div>
        `).join('');

        fileList.querySelectorAll('.file-action.remove').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (!isUploading) {
                    const id = e.target.dataset.id;
                    files = files.filter(f => f.id !== id);
                    renderFileList();
                    updateUI();
                }
            });
        });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function getStatusText(file) {
        switch (file.status) {
            case 'pending': return 'Pending';
            case 'uploading': return `Uploading ${file.progress}%`;
            case 'complete': return 'Complete';
            case 'error': return file.error || 'Error';
            case 'cancelled': return 'Cancelled';
            default: return file.status;
        }
    }

    function updateUI() {
        const hasPending = files.some(f => f.status === 'pending');
        uploadBtn.disabled = !hasPending || isUploading;
        cancelBtn.classList.toggle('hidden', !isUploading);
        stats.classList.toggle('hidden', !isUploading);
    }

    function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.remove('hidden');
        setTimeout(() => {
            errorMessage.classList.add('hidden');
        }, 5000);
    }

    function showLoading(show) {
        loadingScreen.classList.toggle('hidden', !show);
        if (show) {
            mainContent.classList.add('hidden');
        }
    }

    async function startUpload() {
        if (isUploading) return;

        const pendingFiles = files.filter(f => f.status === 'pending');
        if (pendingFiles.length === 0) return;

        isUploading = true;
        isCancelled = false;
        uploadedSize = 0;
        totalSize = pendingFiles.reduce((sum, f) => sum + f.size, 0);
        uploadStartTime = Date.now();

        dropZone.classList.add('disabled');

        for (const file of pendingFiles) {
            if (isCancelled) break;
            try {
                await uploadFile(file);
            } catch (err) {
                file.status = 'error';
                file.error = err.message;
                console.error('Upload error:', err);
            }
            renderFileList();
        }

        isUploading = false;
        dropZone.classList.remove('disabled');
        updateStats();
        updateUI();
    }

    async function uploadFile(fileObj) {
        fileObj.status = 'uploading';
        fileObj.progress = 0;
        renderFileList();
        updateUI();

        const chunks = getChunks(fileObj.file, fileObj.chunkSize);

        const accessToken = await getAccessToken();

        const initResponse = await fetchWithAbort(
            'https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable',
            {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    mimeType: fileObj.type,
                    name: fileObj.name
                })
            },
            fileObj.id
        );

        if (!initResponse.ok) {
            throw new Error('Failed to initialize upload: ' + initResponse.status);
        }

        const location = initResponse.headers.get('location');
        if (!location) {
            throw new Error('No upload location received');
        }

        for (let i = 0; i < chunks.length; i++) {
            if (isCancelled) break;

            try {
                await uploadChunkWithRetry(location, chunks[i], fileObj);
                fileObj.progress = Math.round((i + 1) / chunks.length * 100);
                uploadedSize += chunks[i].numByte;
                renderFileList();
                updateStats();
            } catch (err) {
                if (isCancelled) break;
                throw err;
            }
        }

        if (!isCancelled) {
            fileObj.status = 'complete';
            fileObj.progress = 100;
        }
    }

    async function uploadChunkWithRetry(location, chunk, fileObj) {
        for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
            if (isCancelled) return;

            try {
                await uploadChunk(location, chunk);
                return;
            } catch (err) {
                if (attempt < MAX_RETRIES && !isCancelled) {
                    await sleep(RETRY_DELAY * (attempt + 1));
                    fileObj.retries++;
                } else {
                    throw err;
                }
            }
        }
    }

    async function uploadChunk(location, chunk) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('PUT', location);
            xhr.setRequestHeader('Content-Range', chunk.range);
            xhr.setRequestHeader('Content-Length', chunk.numByte);

            xhr.onload = () => {
                if (xhr.status === 200 || xhr.status === 201) {
                    resolve(xhr);
                } else if (xhr.status === 308) {
                    resolve(xhr);
                } else {
                    reject(new Error('Upload failed: ' + xhr.status));
                }
            };

            xhr.onerror = () => reject(new Error('Network error'));
            xhr.send(chunk.data);
        });
    }

    async function fetchWithAbort(url, options, fileId) {
        const controller = new AbortController();
        abortedControllers.set(fileId, controller);

        try {
            const response = await fetch(url, {
                ...options,
                signal: controller.signal
            });
            return response;
        } finally {
            abortedControllers.delete(fileId);
        }
    }

    function getChunks(file, chunkSize) {
        const chunks = [];
        const fileSize = file.size;

        if (fileSize <= chunkSize) {
            chunks.push({
                startByte: 0,
                endByte: fileSize - 1,
                numByte: fileSize,
                range: `bytes 0-${fileSize - 1}/${fileSize}`
            });
            return chunks;
        }

        let startByte = 0;
        while (startByte < fileSize) {
            const endByte = Math.min(startByte + chunkSize - 1, fileSize - 1);
            const numByte = endByte - startByte + 1;
            chunks.push({
                startByte: startByte,
                endByte: endByte,
                numByte: numByte,
                range: `bytes ${startByte}-${endByte}/${fileSize}`
            });
            startByte = endByte + 1;
        }

        return chunks;
    }

    async function getAccessToken() {
        return new Promise((resolve, reject) => {
            google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getAt();
        });
    }

    function updateStats() {
        const elapsed = (Date.now() - uploadStartTime) / 1000;
        if (elapsed <= 0) return;

        const speed = uploadedSize / elapsed;
        const remaining = totalSize - uploadedSize;
        const remainingTime = remaining / speed;

        document.getElementById('speed').textContent = formatSize(speed) + '/s';
        document.getElementById('remaining').textContent = isFinite(remainingTime) && remainingTime > 0 ? formatTime(Math.round(remainingTime)) : '--';
        document.getElementById('overallProgress').textContent = Math.round(uploadedSize / totalSize * 100) + '%';
    }

    function cancelUpload() {
        isCancelled = true;
        abortedControllers.forEach(controller => {
            controller.abort();
        });
        abortedControllers.clear();

        files.forEach(f => {
            if (f.status === 'uploading') {
                f.status = 'cancelled';
            }
        });

        renderFileList();
        updateUI();
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function init() {
        showLoading(true);
        try {
            storageQuota = await getStorageQuota();
            updateStorageDisplay();
        } catch (err) {
            showError('Failed to load storage info: ' + err.message);
        }
        showLoading(false);
    }

    init();
})();
</script>
</body>
</html>
